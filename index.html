<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaxDocu</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--text:#e8e8e8;--text2:#999;--accent:#e8b84b;--red:#e05555;--radius:8px}
  body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
  header{background:var(--bg2);padding:1rem 2rem;display:flex;align-items:center;gap:1.5rem;position:sticky;top:0;z-index:50;border-bottom:1px solid #222}
  .logo{font-size:1.2rem;font-weight:600;color:var(--accent);white-space:nowrap;letter-spacing:-0.5px}
  .logo span{color:var(--text);font-weight:400}
  .search-bar{flex:1;max-width:480px}
  .search-bar input{width:100%;padding:0.5rem 1rem;background:var(--bg3);border:1px solid #333;border-radius:20px;color:var(--text);font-size:0.875rem}
  .search-bar input:focus{outline:none;border-color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:0.75rem;margin-left:auto}
  .counter-badge{background:var(--bg3);border:1px solid #333;border-radius:20px;padding:0.3rem 0.85rem;font-size:0.78rem;color:var(--text2);white-space:nowrap}
  .counter-badge strong{color:var(--accent);font-weight:600}
  .admin-btn{background:none;border:1px solid #444;color:var(--text2);padding:0.3rem 0.85rem;border-radius:20px;cursor:pointer;font-size:0.75rem}
  .admin-btn:hover{border-color:var(--accent);color:var(--accent)}
  .admin-btn.active{background:#e8b84b22;border-color:var(--accent);color:var(--accent)}
  .filters{padding:1rem 2rem;display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid #1a1a1a}
  .filters select{padding:0.4rem 0.75rem;background:var(--bg2);border:1px solid #333;border-radius:20px;color:var(--text);font-size:0.8rem;cursor:pointer}
  .filters select:focus{outline:none;border-color:var(--accent)}
  .grid-container{padding:1.5rem 2rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem}
  .card{cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--bg2);transition:transform .2s;position:relative}
  .card:hover{transform:scale(1.03)}
  .poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg3)}
  .poster img{width:100%;height:100%;object-fit:cover}
  .poster-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:1rem}
  .poster-placeholder .p-title{font-size:0.7rem;color:var(--text2);text-align:center;line-height:1.3}
  .poster-placeholder .p-icon{font-size:2rem;opacity:0.25}
  .quality-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.8);color:var(--accent);font-size:0.62rem;font-weight:500;padding:2px 6px;border-radius:4px}
  .deleted-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#e05555;font-weight:500;letter-spacing:.05em}
  .card-info{padding:0.6rem 0.75rem}
  .card-title{font-size:0.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:0.7rem;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg2);border-radius:12px;width:100%;max-width:780px}
  .modal-close-bar{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1rem;border-bottom:1px solid #2a2a2a}
  .modal-close-bar .left{display:flex;gap:0.5rem}
  .modal-close-bar button{background:var(--bg3);border:none;color:var(--text2);padding:0.35rem 0.85rem;border-radius:20px;cursor:pointer;font-size:0.78rem}
  .modal-close-bar button:hover{color:var(--text)}
  .btn-identify{background:#1a3a5c!important;color:#5ab4f5!important;border:1px solid #2a5a8c!important}
  .btn-identify:hover{background:#1e4a74!important}
  .btn-delete{background:#3a1a1a!important;color:var(--red)!important;border:1px solid #6a2a2a!important}
  .btn-delete:hover{background:#4a2020!important}
  .modal-top{display:flex;gap:1.5rem;padding:1.5rem}
  .modal-poster{width:170px;min-width:170px;aspect-ratio:2/3;border-radius:var(--radius);overflow:hidden;background:var(--bg3)}
  .modal-poster img{width:100%;height:100%;object-fit:cover}
  .modal-body{flex:1;min-width:0}
  .modal-title{font-size:1.3rem;font-weight:500;margin-bottom:0.25rem;line-height:1.3}
  .modal-sub{color:var(--text2);font-size:0.85rem;margin-bottom:1rem}
  .modal-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1rem}
  .tag{padding:0.25rem 0.65rem;background:var(--bg3);border-radius:20px;font-size:0.72rem;color:var(--text2)}
  .tag.accent{background:#e8b84b22;color:var(--accent)}
  .modal-synopsis{font-size:0.875rem;color:var(--text2);line-height:1.65;margin-bottom:1.25rem}
  .admin-actions{display:none;gap:0.5rem;margin-bottom:1rem}
  .admin-actions.visible{display:flex;flex-wrap:wrap}
  .action-btn{background:none;border:1px solid #444;color:var(--text2);padding:0.4rem 1rem;border-radius:20px;cursor:pointer;font-size:0.78rem}
  .action-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* EDIT PANEL */
  .edit-panel{display:none;padding:1.25rem 1.5rem;border-top:1px solid #2a2a2a;background:var(--bg3)}
  .edit-panel.open{display:block}
  .edit-panel h3{font-size:0.78rem;font-weight:500;color:var(--text2);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.06em}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem}
  .edit-field{display:flex;flex-direction:column;gap:0.3rem}
  .edit-field.full{grid-column:1/-1}
  .edit-field label{font-size:0.72rem;color:var(--text2)}
  .edit-field input,.edit-field textarea{background:var(--bg2);border:1px solid #444;border-radius:6px;color:var(--text);padding:0.5rem 0.75rem;font-size:0.85rem;font-family:inherit;resize:vertical}
  .edit-field input:focus,.edit-field textarea:focus{outline:none;border-color:var(--accent)}
  .edit-actions{display:flex;align-items:center;gap:0.5rem}
  .btn-save{background:var(--accent);color:#000;border:none;padding:0.5rem 1.25rem;border-radius:20px;cursor:pointer;font-size:0.82rem;font-weight:500}
  .btn-cancel-edit{background:none;border:1px solid #444;color:var(--text2);padding:0.5rem 1rem;border-radius:20px;cursor:pointer;font-size:0.82rem}
  .save-notice{font-size:0.75rem;color:#4c4;display:none}

  /* IDENTIFY PANEL */
  .identify-panel{display:none;padding:1.25rem 1.5rem;border-top:1px solid #2a2a2a;background:#0d1e2e}
  .identify-panel.open{display:block}
  .identify-panel h3{font-size:0.78rem;font-weight:500;color:#5ab4f5;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.06em}
  .identify-search{display:flex;gap:0.5rem;margin-bottom:1rem}
  .identify-search input{flex:1;background:#0a1520;border:1px solid #2a5a8c;border-radius:6px;color:var(--text);padding:0.5rem 0.75rem;font-size:0.85rem}
  .identify-search input:focus{outline:none;border-color:#5ab4f5}
  .identify-search button{background:#1a3a5c;color:#5ab4f5;border:1px solid #2a5a8c;padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.82rem;white-space:nowrap}
  .identify-search button:hover{background:#1e4a74}
  .tmdb-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.75rem;max-height:300px;overflow-y:auto}
  .tmdb-result{cursor:pointer;border-radius:6px;overflow:hidden;border:2px solid transparent;transition:border-color .15s}
  .tmdb-result:hover{border-color:#5ab4f5}
  .tmdb-result img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3)}
  .tmdb-result-info{padding:0.4rem;font-size:0.65rem;color:var(--text2);line-height:1.3}
  .tmdb-result-info strong{color:var(--text);display:block}
  .identify-loading{color:#5ab4f5;font-size:0.82rem;padding:1rem 0}

  /* DELETE CONFIRM */
  .delete-panel{display:none;padding:1.25rem 1.5rem;border-top:1px solid #2a2a2a;background:#1a0a0a}
  .delete-panel.open{display:block}
  .delete-panel p{font-size:0.875rem;color:var(--text2);margin-bottom:1rem}
  .delete-panel strong{color:var(--red)}
  .delete-actions{display:flex;gap:0.5rem}
  .btn-confirm-delete{background:var(--red);color:#fff;border:none;padding:0.5rem 1.25rem;border-radius:20px;cursor:pointer;font-size:0.82rem;font-weight:500}
  .btn-cancel-delete{background:none;border:1px solid #444;color:var(--text2);padding:0.5rem 1rem;border-radius:20px;cursor:pointer;font-size:0.82rem}

  /* ADMIN LOGIN */
  .admin-login-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
  .admin-login-bg.open{display:flex}
  .admin-login-box{background:var(--bg2);padding:2rem;border-radius:12px;width:100%;max-width:320px;text-align:center}
  .admin-login-box h2{font-size:1rem;font-weight:500;margin-bottom:0.5rem}
  .admin-login-box p{font-size:0.8rem;color:var(--text2);margin-bottom:1.25rem}
  .admin-login-box input{width:100%;padding:0.65rem 1rem;background:var(--bg3);border:1px solid #333;border-radius:6px;color:var(--text);font-size:0.9rem;margin-bottom:0.75rem}
  .admin-login-box input:focus{outline:none;border-color:var(--accent)}
  .admin-login-box .btn-row{display:flex;gap:0.5rem}
  .admin-login-box .btn-row button{flex:1;padding:0.6rem;border-radius:6px;cursor:pointer;font-size:0.85rem}
  .btn-login-ok{background:var(--accent);color:#000;border:none;font-weight:500}
  .btn-login-cancel{background:none;border:1px solid #444;color:var(--text2)}
  .login-err{font-size:0.75rem;color:var(--red);margin-top:0.5rem;display:none}

  .empty{text-align:center;padding:4rem;color:var(--text2)}
  @media(max-width:600px){
    header{padding:0.75rem 1rem;flex-wrap:wrap}
    .grid-container{padding:1rem}
    .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.75rem}
    .modal-top{flex-direction:column}
    .modal-poster{width:130px}
    .filters{padding:0.75rem 1rem}
    .edit-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Max<span>Docu</span></div>
  <div class="search-bar">
    <input type="search" id="search" placeholder="Rechercher un titre, réalisateur..." oninput="applyFilters()">
  </div>
  <div class="header-right">
    <div class="counter-badge" id="counter">...</div>
    <button class="admin-btn" id="admin-toggle-btn" onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<div class="filters">
  <select id="filter-theme" onchange="applyFilters()"><option value="">Tous les thèmes</option></select>
  <select id="filter-annee" onchange="applyFilters()"><option value="">Toutes les années</option></select>
  <select id="filter-qualite" onchange="applyFilters()"><option value="">Toutes les qualités</option></select>
  <select id="filter-sort" onchange="applyFilters()">
    <option value="titre">Titre A→Z</option>
    <option value="annee-desc">Année récente</option>
    <option value="annee-asc">Année ancienne</option>
    <option value="note">Mieux notés</option>
    <option value="duree-asc">Durée croissante</option>
    <option value="duree-desc">Durée décroissante</option>
  </select>
</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div style="font-size:2.5rem;opacity:.3">&#127916;</div>
    <p>Aucun documentaire trouvé</p>
  </div>
</div>

<!-- MODAL FILM -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-close-bar">
      <div class="left" id="modal-admin-btns" style="display:none">
        <button class="btn-identify" onclick="openIdentify()">Identifier</button>
        <button onclick="openEdit()">Modifier</button>
        <button class="btn-delete" onclick="openDelete()">Supprimer</button>
      </div>
      <button onclick="closeModal()">Fermer</button>
    </div>
    <div class="modal-top">
      <div class="modal-poster"><img id="modal-img" src="" alt=""></div>
      <div class="modal-body">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-sub" id="modal-sub"></div>
        <div class="modal-tags" id="modal-tags"></div>
        <div class="modal-synopsis" id="modal-synopsis"></div>
      </div>
    </div>

    <!-- IDENTIFY -->
    <div class="identify-panel" id="identify-panel">
      <h3>Identifier sur TMDB</h3>
      <div class="identify-search">
        <input type="text" id="tmdb-search-input" placeholder="Titre à rechercher...">
        <button onclick="searchTMDB()">Rechercher</button>
      </div>
      <div id="tmdb-results-container"></div>
    </div>

    <!-- EDIT -->
    <div class="edit-panel" id="edit-panel">
      <h3>Modifier les informations</h3>
      <div class="edit-grid">
        <div class="edit-field"><label>Titre</label><input type="text" id="e-titre"></div>
        <div class="edit-field"><label>Réalisateur</label><input type="text" id="e-real"></div>
        <div class="edit-field"><label>Année</label><input type="number" id="e-annee"></div>
        <div class="edit-field"><label>Durée</label><input type="text" id="e-duree"></div>
        <div class="edit-field"><label>Thèmes (séparés par des virgules)</label><input type="text" id="e-themes"></div>
        <div class="edit-field"><label>Qualité</label><input type="text" id="e-qualite"></div>
        <div class="edit-field full"><label>Synopsis</label><textarea id="e-synopsis" rows="4"></textarea></div>
      </div>
      <div class="edit-actions">
        <button class="btn-save" onclick="saveEdit()">Enregistrer</button>
        <button class="btn-cancel-edit" onclick="closePanel('edit-panel')">Annuler</button>
        <span class="save-notice" id="save-notice">Sauvegardé !</span>
      </div>
    </div>

    <!-- DELETE -->
    <div class="delete-panel" id="delete-panel">
      <p>Supprimer <strong id="delete-title-label"></strong> de la liste ? Cette action est réversible.</p>
      <div class="delete-actions">
        <button class="btn-confirm-delete" onclick="confirmDelete()">Oui, supprimer</button>
        <button class="btn-cancel-delete" onclick="closePanel('delete-panel')">Annuler</button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="admin-login-bg" id="admin-login">
  <div class="admin-login-box">
    <h2>Mode admin</h2>
    <p>Entrez le mot de passe pour activer les fonctions d'administration</p>
    <input type="password" id="admin-pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkAdmin()">
    <div class="btn-row">
      <button class="btn-login-cancel" onclick="closeAdminLogin()">Annuler</button>
      <button class="btn-login-ok" onclick="checkAdmin()">Entrer</button>
    </div>
    <div class="login-err" id="admin-err">Mot de passe incorrect</div>
  </div>
</div>

<script>
var TMDB_KEY = 'b7b704d83f2ce4216a8568bb3aee664c';
var ADMIN_PWD = 'Juliemanou91!';
var STORAGE_KEY = 'maxdocu_edits';
var DELETED_KEY = 'maxdocu_deleted';
var allDocs = [];
var posterCache = {};
var currentDocIndex = -1;
var isAdmin = false;

function normalize(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function parseDuree(d){
  if(!d) return 0;
  var m=String(d).match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

function loadEdits(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }catch(e){ return {}; } }
function saveEditsStore(e){ localStorage.setItem(STORAGE_KEY,JSON.stringify(e)); }
function loadDeleted(){ try{ return JSON.parse(localStorage.getItem(DELETED_KEY)||'[]'); }catch(e){ return []; } }
function saveDeleted(d){ localStorage.setItem(DELETED_KEY,JSON.stringify(d)); }

function applyEdits(doc){
  var edits=loadEdits();
  var e=edits[doc.titre];
  return e ? Object.assign({},doc,e) : doc;
}

function toggleAdmin(){
  if(isAdmin){ isAdmin=false; document.getElementById('admin-toggle-btn').classList.remove('active'); applyFilters(); return; }
  document.getElementById('admin-pwd').value='';
  document.getElementById('admin-err').style.display='none';
  document.getElementById('admin-login').classList.add('open');
  setTimeout(function(){ document.getElementById('admin-pwd').focus(); },100);
}
function closeAdminLogin(){ document.getElementById('admin-login').classList.remove('open'); }
function checkAdmin(){
  if(document.getElementById('admin-pwd').value===ADMIN_PWD){
    isAdmin=true;
    document.getElementById('admin-toggle-btn').classList.add('active');
    closeAdminLogin();
    applyFilters();
  } else {
    document.getElementById('admin-err').style.display='block';
  }
}

fetch('data.json')
  .then(function(r){ return r.json(); })
  .then(function(data){ allDocs=data; buildFilters(); applyFilters(); });

function buildFilters(){
  var themes=new Set(),annees=new Set(),qualites=new Set();
  var deleted=loadDeleted();
  allDocs.forEach(function(d){
    if(deleted.indexOf(d.titre)!==-1) return;
    var doc=applyEdits(d);
    if(doc.annee) annees.add(doc.annee);
    if(doc.qualite&&doc.qualite!=='Inconnue') qualites.add(doc.qualite);
    if(doc.themes) doc.themes.split(',').forEach(function(t){ var th=t.trim(); if(th) themes.add(th); });
  });
  var ft=document.getElementById('filter-theme');
  Array.from(themes).sort().forEach(function(t){ var o=document.createElement('option');o.value=t;o.textContent=t;ft.appendChild(o); });
  var fa=document.getElementById('filter-annee');
  Array.from(annees).sort(function(a,b){return b-a;}).forEach(function(a){ var o=document.createElement('option');o.value=a;o.textContent=a;fa.appendChild(o); });
  var fq=document.getElementById('filter-qualite');
  ['4K','1080p','720p','576p','480p','SD'].filter(function(q){return qualites.has(q);}).forEach(function(q){ var o=document.createElement('option');o.value=q;o.textContent=q;fq.appendChild(o); });
}

function applyFilters(){
  var q=document.getElementById('search').value.toLowerCase();
  var theme=document.getElementById('filter-theme').value;
  var annee=document.getElementById('filter-annee').value;
  var qualite=document.getElementById('filter-qualite').value;
  var sort=document.getElementById('filter-sort').value;
  var deleted=loadDeleted();

  var filtered=allDocs.map(function(d,i){ return {doc:applyEdits(d),idx:i,isDeleted:deleted.indexOf(d.titre)!==-1}; })
    .filter(function(item){
      if(item.isDeleted&&!isAdmin) return false;
      var d=item.doc;
      if(q&&!normalize(d.titre).includes(normalize(q))&&!normalize(d.realisateur).includes(normalize(q))) return false;
      if(theme&&(!d.themes||!d.themes.includes(theme))) return false;
      if(annee&&String(d.annee)!==String(annee)) return false;
      if(qualite&&d.qualite!==qualite) return false;
      return true;
    });

  filtered.sort(function(a,b){
    var da=a.doc,db=b.doc;
    if(sort==='titre') return da.titre.localeCompare(db.titre);
    if(sort==='annee-desc') return (db.annee||0)-(da.annee||0);
    if(sort==='annee-asc') return (da.annee||0)-(db.annee||0);
    if(sort==='note') return (db.note||0)-(da.note||0);
    if(sort==='duree-asc') return parseDuree(da.duree)-parseDuree(db.duree);
    if(sort==='duree-desc') return parseDuree(db.duree)-parseDuree(da.duree);
    return 0;
  });

  var total=allDocs.length-deleted.length;
  var shown=filtered.filter(function(i){return !i.isDeleted;}).length;
  document.getElementById('counter').innerHTML='<strong>'+shown+'</strong>'+(shown<total?' / '+total:'')+' documentaires';

  var grid=document.getElementById('grid');
  document.getElementById('empty').style.display='none';
  grid.innerHTML='';
  if(filtered.length===0){ document.getElementById('empty').style.display='block'; return; }

  filtered.forEach(function(item){
    var doc=item.doc;
    var card=document.createElement('div');
    card.className='card';
    card.onclick=(function(idx){ return function(){ openModal(idx); }; })(item.idx);
    var qb=doc.qualite&&doc.qualite!=='Inconnue'?'<div class="quality-badge">'+escHtml(doc.qualite)+'</div>':'';
    var delBadge=item.isDeleted?'<div class="deleted-overlay">SUPPRIMÉ</div>':'';
    card.innerHTML=
      '<div class="poster">'+
        '<div class="poster-placeholder"><div class="p-icon">&#127916;</div><div class="p-title">'+escHtml(doc.titre)+'</div></div>'+
        qb+delBadge+
      '</div>'+
      '<div class="card-info">'+
        '<div class="card-title">'+escHtml(doc.titre)+'</div>'+
        '<div class="card-meta">'+escHtml((doc.realisateur||'').split(',')[0]||String(doc.annee||''))+'</div>'+
      '</div>';
    grid.appendChild(card);
    if(!item.isDeleted) loadPoster(doc, card.querySelector('.poster'));
  });
}

function loadPoster(doc,posterEl){
  var key=doc.titre+(doc.annee||'');
  if(posterCache[key]){ setPosterImg(posterEl,posterCache[key]); return; }
  fetch('https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(doc.titre)+(doc.annee?'&year='+doc.annee:'')+'&language=fr-FR')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.results&&data.results.length>0&&data.results[0].poster_path){
        var url='https://image.tmdb.org/t/p/w300'+data.results[0].poster_path;
        posterCache[key]=url; setPosterImg(posterEl,url);
      }
    }).catch(function(){});
}
function setPosterImg(posterEl,url){
  var img=document.createElement('img'); img.src=url;
  img.onload=function(){ var ph=posterEl.querySelector('.poster-placeholder'); if(ph) posterEl.replaceChild(img,ph); };
}

function openModal(idx){
  currentDocIndex=idx;
  var doc=applyEdits(allDocs[idx]);
  closePanel('edit-panel'); closePanel('identify-panel'); closePanel('delete-panel');
  document.getElementById('modal-admin-btns').style.display=isAdmin?'flex':'none';
  document.getElementById('modal-title').textContent=doc.titre;
  var sub=[]; if(doc.realisateur) sub.push(doc.realisateur); if(doc.annee) sub.push(doc.annee); if(doc.duree) sub.push(doc.duree);
  document.getElementById('modal-sub').textContent=sub.join(' · ');
  var tagsEl=document.getElementById('modal-tags'); tagsEl.innerHTML='';
  if(doc.note){ var n=Math.round(doc.note/2),stars=''; for(var i=0;i<5;i++) stars+=i<n?'★':'☆'; var nt=document.createElement('span');nt.className='tag accent';nt.textContent=stars+' '+doc.note;tagsEl.appendChild(nt); }
  if(doc.qualite&&doc.qualite!=='Inconnue'){ var qt=document.createElement('span');qt.className='tag accent';qt.textContent=doc.qualite;tagsEl.appendChild(qt); }
  if(doc.themes) doc.themes.split(',').forEach(function(t){ var th=t.trim(); if(th){ var el=document.createElement('span');el.className='tag';el.textContent=th;tagsEl.appendChild(el); } });
  document.getElementById('modal-synopsis').textContent=doc.synopsis||'Aucun synopsis disponible.';
  var img=document.getElementById('modal-img'); img.src='';
  var key=doc.titre+(doc.annee||'');
  if(posterCache[key]){ img.src=posterCache[key]; }
  else {
    fetch('https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(doc.titre)+(doc.annee?'&year='+doc.annee:'')+'&language=fr-FR')
      .then(function(r){return r.json();})
      .then(function(data){ if(data.results&&data.results.length>0&&data.results[0].poster_path){ var url='https://image.tmdb.org/t/p/w500'+data.results[0].poster_path; posterCache[key]=url; img.src=url; } }).catch(function(){});
  }
  document.getElementById('modal').classList.add('open');
}

function openEdit(){
  closePanel('identify-panel'); closePanel('delete-panel');
  var doc=applyEdits(allDocs[currentDocIndex]);
  document.getElementById('e-titre').value=doc.titre||'';
  document.getElementById('e-real').value=doc.realisateur||'';
  document.getElementById('e-annee').value=doc.annee||'';
  document.getElementById('e-duree').value=doc.duree||'';
  document.getElementById('e-themes').value=doc.themes||'';
  document.getElementById('e-qualite').value=doc.qualite||'';
  document.getElementById('e-synopsis').value=doc.synopsis||'';
  document.getElementById('save-notice').style.display='none';
  document.getElementById('edit-panel').classList.add('open');
}

function saveEdit(){
  var edits=loadEdits();
  var key=allDocs[currentDocIndex].titre;
  edits[key]={
    titre:document.getElementById('e-titre').value,
    realisateur:document.getElementById('e-real').value,
    annee:parseInt(document.getElementById('e-annee').value)||null,
    duree:document.getElementById('e-duree').value,
    themes:document.getElementById('e-themes').value,
    qualite:document.getElementById('e-qualite').value,
    synopsis:document.getElementById('e-synopsis').value,
  };
  saveEditsStore(edits);
  var n=document.getElementById('save-notice'); n.style.display='inline';
  setTimeout(function(){ n.style.display='none'; },2000);
  openModal(currentDocIndex);
  applyFilters();
}

function openDelete(){
  closePanel('edit-panel'); closePanel('identify-panel');
  var doc=applyEdits(allDocs[currentDocIndex]);
  document.getElementById('delete-title-label').textContent=doc.titre;
  document.getElementById('delete-panel').classList.add('open');
}
function confirmDelete(){
  var doc=allDocs[currentDocIndex];
  var deleted=loadDeleted();
  var idx=deleted.indexOf(doc.titre);
  if(idx===-1) deleted.push(doc.titre);
  else deleted.splice(idx,1);
  saveDeleted(deleted);
  closeModal();
  applyFilters();
}

function openIdentify(){
  closePanel('edit-panel'); closePanel('delete-panel');
  var doc=applyEdits(allDocs[currentDocIndex]);
  document.getElementById('tmdb-search-input').value=doc.titre;
  document.getElementById('tmdb-results-container').innerHTML='';
  document.getElementById('identify-panel').classList.add('open');
}

function searchTMDB(){
  var q=document.getElementById('tmdb-search-input').value;
  if(!q) return;
  var container=document.getElementById('tmdb-results-container');
  container.innerHTML='<div class="identify-loading">Recherche en cours...</div>';
  fetch('https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(q)+'&language=fr-FR')
    .then(function(r){return r.json();})
    .then(function(data){
      container.innerHTML='';
      if(!data.results||data.results.length===0){ container.innerHTML='<div class="identify-loading">Aucun résultat</div>'; return; }
      var grid=document.createElement('div'); grid.className='tmdb-results';
      data.results.slice(0,12).forEach(function(film){
        var el=document.createElement('div'); el.className='tmdb-result';
        el.innerHTML=
          '<img src="'+(film.poster_path?'https://image.tmdb.org/t/p/w200'+film.poster_path:'')+'">'+
          '<div class="tmdb-result-info"><strong>'+escHtml(film.title)+'</strong>'+(film.release_date?film.release_date.substr(0,4):'')+'</div>';
        el.onclick=(function(f){ return function(){ applyTMDB(f); }; })(film);
        grid.appendChild(el);
      });
      container.appendChild(grid);
    }).catch(function(){ container.innerHTML='<div class="identify-loading">Erreur de connexion</div>'; });
}

function applyTMDB(film){
  fetch('https://api.themoviedb.org/3/movie/'+film.id+'?api_key='+TMDB_KEY+'&append_to_response=credits&language=fr-FR')
    .then(function(r){return r.json();})
    .then(function(data){
      var dirs=data.credits&&data.credits.crew?data.credits.crew.filter(function(p){return p.job==='Director';}).map(function(p){return p.name;}).join(', '):'';
      var edits=loadEdits();
      var key=allDocs[currentDocIndex].titre;
      var existing=edits[key]||{};
      edits[key]=Object.assign({},existing,{
        titre: data.title||existing.titre,
        realisateur: dirs||existing.realisateur,
        annee: data.release_date?parseInt(data.release_date.substr(0,4)):existing.annee,
        synopsis: data.overview||existing.synopsis,
      });
      if(film.poster_path){
        var url='https://image.tmdb.org/t/p/w500'+film.poster_path;
        var key2=(edits[key].titre||allDocs[currentDocIndex].titre)+(edits[key].annee||'');
        posterCache[key2]=url;
        document.getElementById('modal-img').src=url;
        var ph=document.querySelector('.modal-poster .poster-placeholder');
        if(ph) ph.parentNode.replaceChild(Object.assign(document.createElement('img'),{src:url,style:'width:100%;height:100%;object-fit:cover'}),ph);
      }
      saveEditsStore(edits);
      closePanel('identify-panel');
      openModal(currentDocIndex);
      applyFilters();
    });
}

function closePanel(id){ document.getElementById(id).classList.remove('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); closePanel('edit-panel'); closePanel('identify-panel'); closePanel('delete-panel'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });
document.getElementById('tmdb-search-input').addEventListener('keydown',function(e){ if(e.key==='Enter') searchTMDB(); });
</script>
</body>
</html>
